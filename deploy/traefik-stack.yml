services:
  gdq-watch-party:
    image: ghcr.io/loldencode/gdq-cal:latest
    restart: unless-stopped
    environment:
      GDQ_EVENT_ID: "66"
      DATA_FILE: /data/watch-plans.json
      ADMIN_KEY: change-me
    volumes:
      - gdq_watch_party_data:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.gdq-watch-party.rule=Host(`gdq.example.com`)
      - traefik.http.routers.gdq-watch-party.entrypoints=https
      - traefik.http.routers.gdq-watch-party.tls=true
      - traefik.http.routers.gdq-watch-party.service=gdq-watch-party
      - traefik.http.services.gdq-watch-party.loadbalancer.server.port=3000
      - traefik.http.services.gdq-watch-party.loadbalancer.server.scheme=http

networks:
  proxy:
    external: true

volumes:
  gdq_watch_party_data:
